server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 256;

    # Version manifest — must never be cached so clients detect new deploys.
    location = /app_version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
        try_files $uri =404;
    }

    # Flutter bootstrap/runtime entry points live at fixed paths (no content
    # hash), so they MUST be revalidated — otherwise a reload after a new deploy
    # would keep serving the old immutable-cached JS and never update.
    location = /flutter_bootstrap.js   { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /flutter.js             { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /main.dart.js           { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Flutter web SPA - all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
